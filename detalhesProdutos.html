<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bey Store Brasil - Detalhes do Produto</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
</head>
<body class="bg-sky-700 min-h-screen text-white">

    <div class="container mx-auto p-6">
        <div class="flex justify-between items-center mb-8 border-b border-sky-600 pb-4">
            <h1 class="text-4xl font-bold">Bey Store Brasil</h1>
            <button onclick="location.href='index.html'" class="bg-yellow-400 hover:bg-yellow-300 text-black font-bold py-2 px-4 rounded-lg text-sm">Voltar à página inicial</button>
        </div>

        <div class="bg-white rounded-xl p-6 shadow-lg text-black max-w-4xl mx-auto flex flex-wrap md:flex-nowrap gap-6 mt-6">
            <div class="w-full md:w-1/2 bg-slate-200 rounded-lg flex items-center justify-center p-4">
                <img id="detalheImagem" src="" alt="" class="object-contain" style="max-width: 400px; max-height: 400px;">
            </div>
            
            <div class="w-full md:w-1/2 flex flex-col justify-center">
                <h2 id="detalheNome" class="text-3xl font-bold mb-2">Calma lá patrão...</h2>
                <p class="text-gray-500 text-sm mb-4">Geração: <span id="detalheGeracao" class="capitalize">Calma lá patrão...</span></p>
                <p id="detalheDescricao" class="text-gray-700 mb-6 text-sm leading-relaxed">Calma lá patrão...</p>
                <p id="detalhePreco" class="text-3xl font-bold text-green-600 mb-6">R$ 0,00</p>
                <button class="bg-yellow-400 hover:bg-yellow-300 text-black font-bold py-3 px-6 rounded-xl transition text-sm">Comprar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pouchdb@9.0.0/dist/pouchdb.min.js"></script>
    <script src="db.js"></script>
    <script src="scriptProdutos.js"></script>
</body>
</html>
