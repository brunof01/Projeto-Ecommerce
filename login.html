<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bey Store Brasil</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet"/>
</head>
<body class="bg-sky-700 min-h-screen text-white">

    <div class="container mx-auto p-6">
        <div class="flex justify-between items-center mb-8 border-b border-sky-600 pb-4">
            <h1 class="text-4xl font-bold">Bey Store Brasil</h1>
            <button onclick="location.href='index.html'" class="bg-yellow-400 hover:bg-yellow-300 text-black font-bold py-2 px-4 rounded-lg text-sm">Voltar à página inicial</button>
        </div>

        <div class="bg-white rounded-xl p-6 shadow-lg max-w-md mx-auto text-black mt-12">
            <h2 class="text-3xl font-bold mb-6 text-center">Acessar conta</h2>
            
            <p class="mb-2 font-bold text-gray-700 text-sm">E-mail de usuário</p>
            <input id="emailLogin" type="text" placeholder="Digite seu e-mail" class="w-full mb-4 p-2.5 border border-gray-300 rounded-lg bg-gray-50 text-sm">
            
            <p class="mb-2 font-bold text-gray-700 text-sm">Senha de acesso:</p>
            <input id="senhaLogin" type="password" placeholder="Digite sua senha" class="w-full mb-4 p-2.5 border border-gray-300 rounded-lg bg-gray-50 text-sm">
            
            <button id="logar" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 px-5 rounded-xl transition text-sm">Entrar no Sistema</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pouchdb@9.0.0/dist/pouchdb.min.js"></script>
    <script src="db.js"></script>
    <script src="scriptUsuarios.js"></script>
</body>
</html>
